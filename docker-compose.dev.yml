services: 
  # ====== SERVER ======
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - ${API_PORT:-3000}:3000
    environment:
      - PORT=${API_PORT:-3000}
      - DATABASE_URL=${DATABASE_URL}                                                                                                
      - JWT_SECRET=${JWT_SECRET} 
      - RAWG_API_KEY=${RAWG_API_KEY}
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server-node-modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    stdin_open: true
    tty: true
  # ====== CLIENT ======
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_RAWG_API_KEY=${VITE_RAWG_API_KEY}
    ports:
      - 5173:5173
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    stdin_open: true
    tty: true
  # ====== ADMINER ======
  adminer:
    image: adminer
    ports:
      - 8080:8080
    
volumes:
  server-node-modules:
  client-node-modules: